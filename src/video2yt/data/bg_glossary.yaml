# Simplified Chinese terminology corrections for Hearthstone Battlegrounds.
#
# Schema v1 (Phase 2, 2026-05-16). All entries use Simplified Chinese.
#
# Top-level structure:
#   corrections: dict   {误识别: 正确}  — both Simplified
#   canonical:   dict   keyed by category from the whitelist:
#                       hero, minion, spell, trinket, race, mechanic,
#                       meta, english, slang
#   (reader: see CANONICAL_CATEGORIES in src/video2yt/subtitle.py)
#
# Reader still supports v0 (flat canonical list) for backward compat, but new
# additions must use the grouped format.
#
# Note: this glossary serves the SUBTITLE pipeline only. YouTube title /
# description / chapters remain Traditional (台服 "爐石戰記：英雄戰場" branding,
# see docs/superpowers/specs/2026-04-18-video-production-workflow.md).
#
# Sources:
#   hero / minion / spell / trinket: harvested from HearthstoneJSON
#                                    (api.hearthstonejson.com, zhCN, 2026-05-16)
#                                    via scripts/harvest_hearthstone_json.py
#   race / mechanic / meta / slang:  curated manually (Phase 2 F-2/F-3)
#   english:                         curated manually (Phase 2 F-4)

# corrections: error → correct (both simplified)
# Phase 2 v1: empty at F-1 (no entries added yet).
#
# Note on Stage E (BV1Z4dLBLE9B, 2026-05-16) observations: cross-referenced
# with the harvested canonical data, MOST "mishearings" we initially flagged
# turn out to be real card names — ASR was correct, not Codex:
#   寒热骤变      — real BG spell (canonical.spell line ~453)
#   邪火咒龙      — real BG minion (canonical.minion)
#   宁静的冥想者   — real BG minion (Codex saw it correctly as part of 古本那加冥想者
#                                    but over-extended to "四本娜迦宁静的冥想者")
#   胡蒙格斯      — real BG hero; Codex's 独蒙格斯→胡蒙格斯 was correct
#   附魔哨卫      — real BG minion; Codex's 附魔少卫→附魔哨卫 was correct
#   铁炉堡锻砧    — real BG trinket; Codex's 铁路宝钻针→铁炉堡锻砧 was correct
#
# Genuine corrections candidates (where ASR is wrong AND we know the right
# answer) will be added in F-2 based on future raw.srt observations. The
# above suggests with a populated canonical, Codex needs FEWER explicit
# corrections — the canonical list itself does the heavy lifting.
corrections: {}

